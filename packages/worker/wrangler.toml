name = "peptide-tracker-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# AUTH_MODE controls Cloudflare Access JWT verification.
# - "dev"  → Worker injects a synthetic principal (DO NOT deploy with this).
# - "prod" → Real JWT verification against Cloudflare Access JWKS.
[vars]
AUTH_MODE = "dev"
ENVIRONMENT = "development"

# D1 binding. The local persisted db lives under .wrangler/state/v3/d1/
# when running `wrangler dev`. Apply migrations with:
#   pnpm --filter @peptide/worker exec wrangler d1 migrations apply DB --local
[[d1_databases]]
binding = "DB"
database_name = "peptide-tracker-dev"
database_id = "57e43be0-8ef5-4cea-8fc9-6a98fd31a1dc"
migrations_dir = "migrations"

# ─── Staging ─────────────────────────────────────────────────────────────────
[env.staging]
name = "peptide-tracker-worker-staging"
[env.staging.vars]
AUTH_MODE = "prod"
ENVIRONMENT = "staging"

# ─── Production ──────────────────────────────────────────────────────────────
[env.production]
name = "peptide-tracker-worker"
[env.production.vars]
AUTH_MODE = "prod"
ENVIRONMENT = "production"

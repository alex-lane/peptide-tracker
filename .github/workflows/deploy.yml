name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch: # Manual run from the Actions tab.

# Lock concurrency so two pushes in quick succession don't race each other.
concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build web
        run: pnpm --filter @peptide/web build

      # ─── D1 migrations ─────────────────────────────────────────────────
      # Apply pending migrations to the remote D1 database BEFORE the
      # Worker that depends on them deploys. wrangler d1 migrations apply
      # is idempotent — it tracks applied migrations in a system table and
      # skips ones that have already run. Adding new migration files to
      # packages/worker/migrations/ is the only step required to ship a
      # schema change; this workflow picks them up automatically.
      - name: Apply D1 migrations (remote)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/worker
          command: d1 migrations apply DB --remote

      # ─── Worker ───────────────────────────────────────────────────────
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/worker
          command: deploy

      # ─── Pages ────────────────────────────────────────────────────────
      # Runs from packages/web/ so wrangler doesn't pick up the Worker's
      # wrangler.toml. --commit-dirty=true is harmless in CI but keeps
      # local re-runs (workflow_dispatch on a dirty checkout) working.
      - name: Deploy Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/web
          command: pages deploy dist --project-name=peptide-tracker --branch=main --commit-dirty=true
